<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Target Rush</title>
    <link rel="stylesheet" href="style.css">
</head>
<body onclick="initMusic()">

<div id="menu">
    <h1>TARGET RUSH</h1>
    <p class="subtitle">🔫 RETRO AIM TRAINING RANGE 🔫</p>
    <p class="description">Hit as many targets as possible before time runs out.</p>

    <div class="selection-container">
        <div class="selection-box">
            <h3>SELECT TARGET</h3>
            <div class="target-grid">
                <img src="assets/ronaldo.png" alt="Ronaldo" class="target-tile active" onclick="selectTarget('ronaldo', this)">
                <img src="assets/doge.png" alt="Doge" class="target-tile" onclick="selectTarget('doge', this)">
                <img src="assets/diddy.png" alt="Diddy" class="target-tile" onclick="selectTarget('diddy', this)">
                <img src="assets/meme.png" alt="Meme" class="target-tile" onclick="selectTarget('meme', this)">
                <img src="assets/zuck.png" alt="Zuck" class="target-tile" onclick="selectTarget('zuck', this)">
                <img src="assets/epstein.png" alt="Epstein" class="target-tile" onclick="selectTarget('epstein', this)">

                <label class="target-tile upload-tile" id="uploadLabel">
                    <span id="uploadText">+ CUSTOM</span>
                    <input type="file" id="imageUploader" accept="image/*" style="display: none;">
                </label>
            </div>
        </div>

        <div class="selection-box">
            <h3>SELECT MODE</h3>
            <div class="mode-column">
                <button class="mode-btn active" onclick="selectMode('rookie', this)">ROOKIE</button>
                <button class="mode-btn" onclick="selectMode('ranger', this)">RANGER</button>
                <button class="mode-btn" onclick="selectMode('elite', this)">ELITE</button>
                <button class="mode-btn" onclick="selectMode('god', this)">GOD MODE</button>
            </div>
        </div>
    </div>

    <br><br>
    <button id="startBtn">BEGIN TRAINING</button>
</div>

<div id="game" style="display:none;">
    <div id="topBar">
        <span>Score: <span id="score">0</span></span>
        <button id="quitBtn" onclick="quitGame()">QUIT</button>
        <span>Time: <span id="timer">30</span></span>
    </div>
    <div id="gameArea">
        <img id="target" src="" alt="target">
    </div>
</div>

<div id="gameOver" style="display:none;">
    <h1>GAME OVER</h1>
    <p class="subtitle">🏆 Training Results 🏆</p>

    <div class="stats-box">
        <p>Final Score: <span id="finalScore" style="color: #ffd24d;">0</span></p>
        <p>Rank: <span id="finalRank" style="color: #f8e7a1;">Rookie</span></p>
    </div>

    <button id="restartBtn">TRY AGAIN</button>
</div>

<audio id="music" loop>
    <source src="assets/music.mp3" type="audio/mpeg">
</audio>

<script src="script.js"></script>
</body>
</html>
