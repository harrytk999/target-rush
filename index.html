<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Target Rush - Aim Trainer</title>

    <meta property="og:title" content="Target Rush">
    <meta property="og:description" content="Retro Aim Training Range - Hit as many targets as possible!">
    <meta property="og:image" content="./assets/menu-bg.jpg">
    <meta property="og:image:type" content="image/jpeg">
    <meta name="twitter:card" content="summary_large_image">

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="menu-screen" class="screen">
        <div class="menu-container">
            <h1 class="game-title">TARGET RUSH</h1>
            <p class="game-subtitle">🕹️ RETRO AIM TRAINING RANGE 🕹️</p>
            <p class="game-instructions">Hit as many targets as possible before time runs out.</p>

            <div class="selection-box">
                <div class="select-section">
                    <h3>SELECT TARGET</h3>
                    <div class="grid targets-grid">
                        <div class="grid-item target-item active" data-target="ronaldo">
                            <img src="assets/ronaldo.png" alt="Ronaldo">
                        </div>
                        <div class="grid-item target-item" data-target="doge">
                            <img src="assets/doge.png" alt="Doge">
                        </div>
                        <div class="grid-item target-item" data-target="diddy">
                            <img src="assets/diddy.png" alt="Diddy">
                        </div>
                        <div class="grid-item target-item" data-target="zuck">
                            <img src="assets/zuck.png" alt="Zuck">
                        </div>
                        <div class="grid-item target-item" data-target="meme">
                            <img src="assets/meme.png" alt="Meme">
                        </div>
                        <div class="grid-item target-item" data-target="epstein">
                            <img src="assets/epstein.png" alt="Epstein">
                        </div>
                        <div class="grid-item target-item custom-upload" id="custom-target-btn">
                            <span>+ CUSTOM</span>
                            <input type="file" id="custom-target-input" accept="image/*" style="display: none;">
                        </div>
                    </div>
                </div>

                <div class="select-section">
                    <h3>SELECT MODE</h3>
                    <div class="modes-list">
                        <button class="mode-btn active" data-mode="rookie">ROOKIE</button>
                        <button class="mode-btn" data-mode="ranger">RANGER</button>
                        <button class="mode-btn" data-mode="elite">ELITE</button>
                        <button class="mode-btn" data-mode="god">GOD MODE</button>
                    </div>
                </div>
            </div>

            <button id="start-btn" class="action-btn">BEGIN TRAINING</button>
        </div>
    </div>

    <div id="game-screen" class="screen hidden">
        <div id="ui-bar">
            <div class="ui-element">SCORE: <span id="score-val">0</span></div>
            <div class="ui-element">TIME: <span id="time-val">30</span>s</div>
            <div class="ui-element">ACCURACY: <span id="accuracy-val">100</span>%</div>
        </div>
        <div id="game-container"></div>
    </div>

    <div id="gameover-screen" class="screen hidden">
        <div class="menu-container gameover-container">
            <h1 class="gameover-title">TRAINING COMPLETE</h1>
            
            <div class="stats-display">
                <p>FINAL SCORE: <span id="final-score">0</span></p>
                <p>TARGETS HIT: <span id="final-hits">0</span></p>
                <p>SHOTS FIRED: <span id="final-shots">0</span></p>
                <p>ACCURACY: <span id="final-accuracy">0</span>%</p>
            </div>

            <div class="gameover-actions">
                <button id="retry-btn" class="action-btn">RETRY</button>
                <button id="main-menu-btn" class="action-btn secondary">MAIN MENU</button>
            </div>
        </div>
    </div>

    <audio id="bg-music" src="assets/music.mp3" loop></audio>

    <script src="script.js"></script>
</body>
</html>
